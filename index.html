<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Room Planner</title>
<style>
  :root{
    --bg:#f7f7f8; --panel:#ffffff; --border:#e2e2e6; --text:#26272b; --muted:#7a7c85;
    --accent:#2b7de9; --accent-soft:#e3eefc; --danger:#d64545;
    --toolbar-h:46px; --status-h:26px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; overflow:hidden;}
  body{
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text); background:var(--bg);
    display:grid; grid-template-rows:var(--toolbar-h) 1fr var(--status-h);
  }
  button{font:inherit; color:inherit; background:none; border:none; cursor:pointer;}
  input,select{font:inherit; color:inherit;}

  /* ---------- Toolbar ---------- */
  #toolbar{
    display:flex; align-items:center; gap:4px; padding:0 10px;
    background:var(--panel); border-bottom:1px solid var(--border);
    white-space:nowrap; overflow-x:auto; overflow-y:hidden;
  }
  .tb-btn{
    padding:5px 9px; border-radius:6px; border:1px solid transparent; color:var(--text);
  }
  .tb-btn:hover{background:#f0f0f2;}
  .tb-btn:disabled{opacity:.35; cursor:default;}
  .tb-btn:disabled:hover{background:none;}
  .tb-btn.on{background:var(--accent-soft); color:var(--accent); border-color:#bcd6f7;}
  .tb-sep{width:1px; height:22px; background:var(--border); margin:0 6px; flex:none;}
  .tb-group{display:flex; align-items:center; gap:2px;}
  #unitsToggle{display:flex; border:1px solid var(--border); border-radius:6px; overflow:hidden;}
  #unitsToggle button{padding:4px 10px;}
  #unitsToggle button.on{background:var(--accent); color:#fff;}
  #zoomPct{min-width:52px; text-align:center; color:var(--muted);}
  #layoutName{color:var(--muted); margin-left:auto; padding:0 8px; overflow:hidden; text-overflow:ellipsis; max-width:220px;}

  /* ---------- Main area ---------- */
  #main{display:grid; grid-template-columns:212px 1fr 262px; min-height:0;}
  #sidebar,#props{
    background:var(--panel); overflow-y:auto; min-height:0;
  }
  #sidebar{border-right:1px solid var(--border); padding:8px;}
  #props{border-left:1px solid var(--border); padding:10px;}

  /* tools */
  #tools{display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-bottom:10px;}
  .tool-btn{
    display:flex; align-items:center; gap:6px; padding:7px 8px; border-radius:6px;
    border:1px solid var(--border); background:#fbfbfc; text-align:left;
  }
  .tool-btn:hover{background:#f0f0f2;}
  .tool-btn.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  .tool-btn .key{margin-left:auto; font-size:10px; color:var(--muted); border:1px solid var(--border);
    border-radius:3px; padding:0 4px; background:#fff;}
  .tool-btn.on .key{color:var(--accent); border-color:#bcd6f7;}

  /* palette */
  #palette details{margin-bottom:2px;}
  #palette summary{
    cursor:pointer; padding:5px 4px; font-weight:600; font-size:12px; color:var(--muted);
    list-style:none; user-select:none; border-radius:4px;
  }
  #palette summary:hover{background:#f0f0f2;}
  #palette summary::before{content:"▸"; display:inline-block; margin-right:5px; transition:transform .1s;}
  #palette details[open] summary::before{transform:rotate(90deg);}
  .pal-grid{display:grid; grid-template-columns:1fr 1fr; gap:4px; padding:2px 0 6px;}
  .pal-item{
    border:1px solid var(--border); border-radius:6px; background:#fff; padding:4px 2px 2px;
    display:flex; flex-direction:column; align-items:center; gap:1px; cursor:grab; user-select:none;
  }
  .pal-item:hover{border-color:var(--accent); background:var(--accent-soft);}
  .pal-item.armed{border-color:var(--accent); background:var(--accent-soft); box-shadow:0 0 0 1px var(--accent);}
  .pal-item canvas{display:block;}
  .pal-item span{font-size:10px; color:var(--muted); text-align:center; line-height:1.2; padding:0 2px 2px;}
  .pal-empty{grid-column:1/-1; font-size:11px; color:var(--muted); padding:4px;}

  #shortcuts{margin-top:12px; font-size:11px; color:var(--muted); border-top:1px solid var(--border); padding-top:8px;}
  #shortcuts b{display:inline-block; min-width:70px; font-weight:600; color:#5a5c64;}

  /* canvas */
  #canvasWrap{position:relative; min-width:0; min-height:0; background:#fdfdfd;}
  #cvs{position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none;}

  /* properties panel */
  #props h3{font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin:2px 0 8px;}
  .prop-row{display:flex; align-items:center; gap:6px; margin-bottom:6px;}
  .prop-row label{flex:0 0 82px; color:var(--muted); font-size:12px;}
  .prop-row input[type=text],.prop-row input[type=number],.prop-row select{
    flex:1; min-width:0; padding:4px 6px; border:1px solid var(--border); border-radius:5px; background:#fff;
  }
  .prop-row input:focus,.prop-row select:focus{outline:none; border-color:var(--accent);}
  .prop-row input[type=color]{flex:0 0 40px; height:26px; padding:1px 2px; border:1px solid var(--border); border-radius:5px; background:#fff;}
  .prop-row input[type=checkbox]{flex:0 0 auto;}
  .swatch-row{display:flex; flex-wrap:wrap; gap:4px; flex:1;}
  .swatch{
    width:20px; height:20px; border-radius:5px; border:1px solid rgba(0,0,0,.18); padding:0;
  }
  .swatch:hover{transform:scale(1.15); border-color:var(--accent);}
  .prop-btns{display:flex; flex-wrap:wrap; gap:5px; margin:8px 0;}
  .p-btn{
    padding:5px 9px; border:1px solid var(--border); border-radius:6px; background:#fbfbfc; font-size:12px;
  }
  .p-btn:hover{background:#f0f0f2;}
  .p-btn.danger{color:var(--danger); border-color:#f0caca;}
  .p-btn.danger:hover{background:#fdf0f0;}
  .stat-row{display:flex; justify-content:space-between; margin-bottom:5px; font-size:12px;}
  .stat-row span:first-child{color:var(--muted);}
  .prop-note{font-size:11px; color:var(--muted); margin:6px 0;}
  .prop-hr{border:none; border-top:1px solid var(--border); margin:10px 0;}

  /* status bar */
  #status{
    display:flex; align-items:center; gap:16px; padding:0 12px;
    background:var(--panel); border-top:1px solid var(--border);
    font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden;
  }
  #statusHint{overflow:hidden; text-overflow:ellipsis;}
  #statusMeasure{color:var(--accent); font-weight:600;}
  #statusZoom{margin-left:auto;}

  /* modal */
  #modalOverlay{
    position:fixed; inset:0; background:rgba(20,20,25,.35); display:none;
    align-items:center; justify-content:center; z-index:50;
  }
  #modalOverlay.show{display:flex;}
  #modalBox{
    background:var(--panel); border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,.25);
    min-width:340px; max-width:460px; max-height:80vh; display:flex; flex-direction:column;
  }
  #modalTitle{padding:14px 16px 6px; font-weight:600; font-size:15px;}
  #modalBody{padding:6px 16px 14px; overflow-y:auto;}
  .layout-row{display:flex; align-items:center; gap:6px; padding:6px 0; border-bottom:1px solid var(--border);}
  .layout-row:last-child{border-bottom:none;}
  .layout-row .lname{flex:1; overflow:hidden; text-overflow:ellipsis;}
  .layout-row .ldate{color:var(--muted); font-size:11px;}
  .modal-close{position:absolute;}
  .modal-footer{display:flex; justify-content:flex-end; gap:8px; padding:0 16px 14px;}

  /* toast */
  #toast{
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    background:#2c2d33; color:#fff; padding:8px 16px; border-radius:8px; font-size:12.5px;
    opacity:0; pointer-events:none; transition:opacity .25s; z-index:60;
  }
  #toast.show{opacity:.95;}
</style>
</head>
<body>

<div id="toolbar">
  <div class="tb-group">
    <button class="tb-btn" id="btnNew" title="Start a new layout">New</button>
    <button class="tb-btn" id="btnSave" title="Save layout (Ctrl+S)">Save</button>
    <button class="tb-btn" id="btnSaveAs" title="Save under a new name">Save&nbsp;As</button>
    <button class="tb-btn" id="btnLayouts" title="Open a saved layout">Layouts…</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="btnImport" title="Import layout from a JSON file">Import</button>
    <button class="tb-btn" id="btnExportJson" title="Download layout as JSON">JSON</button>
    <button class="tb-btn" id="btnExportPng" title="Export image (Ctrl+E)">PNG</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="btnUndo" title="Undo (Ctrl+Z)">↶ Undo</button>
    <button class="tb-btn" id="btnRedo" title="Redo (Ctrl+Shift+Z)">↷ Redo</button>
  </div>
  <div class="tb-sep"></div>
  <div id="unitsToggle" title="Units">
    <button id="btnImperial">ft / in</button>
    <button id="btnMetric">m / cm</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="btnGrid" title="Show / hide grid">Grid</button>
    <button class="tb-btn" id="btnSnap" title="Snap to grid (hold Alt to invert while dragging)">Snap</button>
    <button class="tb-btn" id="btnRulers" title="Show / hide rulers">Rulers</button>
    <button class="tb-btn" id="btnDims" title="Show / hide wall dimensions">Dims</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="btnZoomOut" title="Zoom out">−</button>
    <button class="tb-btn" id="zoomPct" title="Reset zoom to 100%">100%</button>
    <button class="tb-btn" id="btnZoomIn" title="Zoom in">+</button>
    <button class="tb-btn" id="btnZoomFit" title="Zoom to fit layout">Fit</button>
  </div>
  <span id="layoutName"></span>
</div>

<div id="main">
  <div id="sidebar">
    <div id="tools"></div>
    <div id="palette"></div>
    <div id="shortcuts">
      <div><b>Pan</b>Space-drag / mid-drag</div>
      <div><b>Zoom</b>Mouse wheel</div>
      <div><b>Straight</b>Hold Shift (wall)</div>
      <div><b>Snap off</b>Hold Alt</div>
      <div><b>Nudge</b>Arrow keys (+Shift)</div>
      <div><b>Duplicate</b>Ctrl+D</div>
      <div><b>Delete</b>Del / Backspace</div>
      <div><b>Add corner</b>Double-click wall</div>
    </div>
  </div>
  <div id="canvasWrap"><canvas id="cvs"></canvas></div>
  <div id="props"></div>
</div>

<div id="status">
  <span id="statusPos"></span>
  <span id="statusMeasure"></span>
  <span id="statusHint"></span>
  <span id="statusZoom"></span>
</div>

<div id="modalOverlay"><div id="modalBox">
  <div id="modalTitle"></div>
  <div id="modalBody"></div>
</div></div>
<div id="toast"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">

<script>
'use strict';
/* ============================================================
   Room Planner — single-file, offline, vanilla JS + Canvas.
   All geometry is stored in millimeters (canonical unit);
   the units toggle only changes display & input parsing.
   ============================================================ */

/* ---------------- constants & tiny utils ---------------- */
const IN = 25.4;                       // mm per inch
const BASE_SCALE = 0.1;                // px per mm that counts as "100%"
const MIN_SCALE = 0.008, MAX_SCALE = 4;
const HANDLE_PX = 7;                   // screen-px size of grab handles
const STORE_AUTO = 'roomPlanner.autosave';
const STORE_LAYOUTS = 'roomPlanner.layouts';

const uid = () => 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rad = d => d * Math.PI / 180;
const deg = r => r * 180 / Math.PI;
const $ = id => document.getElementById(id);

/* ---------------- state ---------------- */
function defaultState() {
  return {
    version: 1,
    name: 'Untitled',
    units: 'imperial',                       // 'imperial' | 'metric'
    grid: { spacing: 152.4, visible: true, snap: true },  // 6 in
    wallThickness: 114.3,                    // 4.5 in
    showRulers: true,
    showDims: true,
    showOverlap: false,   // red outline on colliding furniture (opt-in)
    room: { vertices: [] },                  // [{x,y}] mm, closed polygon
    openings: [],   // {id, type:'door'|'window', wall, offset(center, mm from wall start), width, hinge:'left'|'right', dir:'in'|'out'}
    furniture: [],  // {id, kind, shape:'rect'|'circle', label, x, y, w, d, rot, color}  (array order = z-order)
    customPalette: []  // {key, label, kind, shape, w, d, color}
  };
}

let state = defaultState();
let view = { x: -3200, y: -2400, scale: 0.12 };   // world mm at canvas top-left, px per mm

/* selection — kinds are mutually exclusive (furn may be multi) */
let sel = { furn: [], opening: null, vertex: null, wall: null };
function clearSel() { sel = { furn: [], opening: null, vertex: null, wall: null }; }
function selectFurn(ids) { clearSel(); sel.furn = Array.isArray(ids) ? ids.slice() : [ids]; }

/* interaction state */
let tool = 'select';
let drawingVerts = null;        // wall tool: array of placed vertices
let placing = null;             // {def} palette item armed for placement
let dragState = null;           // active pointer drag
let measure = { a: null, b: null, live: false };
let pointerWorld = { x: 0, y: 0 };
let pointerScreen = { x: 0, y: 0 };
let spaceDown = false, altDown = false, shiftDown = false;
let hoverWall = null;           // ghost info for door/window tools

const furnById = id => state.furniture.find(f => f.id === id);

/* ---------------- units: formatting & parsing ---------------- */
const QUARTERS = { 0: '', 1: '¼', 2: '½', 3: '¾' };

function fmtLen(mm) {
  const neg = mm < 0 ? '-' : '';
  mm = Math.abs(mm);
  if (state.units === 'metric') {
    if (mm >= 999.5) {
      let m = (mm / 1000).toFixed(2).replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
      return neg + m + ' m';
    }
    let cm = Math.round(mm / 10 * 10) / 10;
    return neg + cm + ' cm';
  }
  // imperial: feet + inches, inches to nearest 1/4"
  let q = Math.round((mm / IN) * 4);          // quarter inches
  let ft = Math.floor(q / 48);
  q -= ft * 48;
  const whole = Math.floor(q / 4), frac = QUARTERS[q % 4];
  let inStr = '';
  if (whole > 0 || (!frac && ft === 0)) inStr += whole;
  inStr += frac;
  if (ft > 0) return neg + ft + '′' + (inStr ? ' ' + inStr + '″' : '');
  return neg + (inStr || '0') + '″';
}

function fmtArea(mm2) {
  if (state.units === 'metric') return (mm2 / 1e6).toFixed(2) + ' m²';
  return (mm2 / (IN * IN * 144)).toFixed(1) + ' ft²';
}

function parseFrac(s) {
  s = s.trim();
  const m = s.match(/^(-?\d+(?:\.\d+)?)?(?:\s+)?(?:(\d+)\s*\/\s*(\d+))?$/);
  if (!m || (!m[1] && !m[2])) return NaN;
  let v = m[1] ? parseFloat(m[1]) : 0;
  if (m[2]) v += (v < 0 ? -1 : 1) * parseInt(m[2], 10) / parseInt(m[3], 10);
  return v;
}

/* Accepts: "3.81m" "381cm" "900mm" | `12' 6"` `12'` `6 1/2"` | bare number = in (imperial) or cm (metric). Returns mm or null. */
function parseLen(str) {
  if (typeof str !== 'string') return null;
  let s = str.trim().toLowerCase().replace(/[″”]/g, '"').replace(/[′’]/g, "'");
  if (!s) return null;
  let m;
  if ((m = s.match(/^(-?[\d.]+)\s*mm$/))) return parseFloat(m[1]);
  if ((m = s.match(/^(-?[\d.]+)\s*cm$/))) return parseFloat(m[1]) * 10;
  if ((m = s.match(/^(-?[\d.]+)\s*m$/))) return parseFloat(m[1]) * 1000;
  if ((m = s.match(/^(-?[\d.]+)\s*(in|")$/))) return parseFloat(m[1]) * IN;
  if ((m = s.match(/^(-?[\d.]+)\s*ft$/))) return parseFloat(m[1]) * IN * 12;
  if (s.includes("'") || s.includes('"')) {
    let ft = 0, inch = 0, rest = s;
    if (s.includes("'")) {
      const parts = s.split("'");
      ft = parseFloat(parts[0]);
      if (isNaN(ft)) return null;
      rest = parts[1] || '';
    }
    rest = rest.replace(/"/g, '').trim();
    if (rest) {
      inch = parseFrac(rest);
      if (isNaN(inch)) return null;
    }
    const sign = ft < 0 ? -1 : 1;
    return sign * (Math.abs(ft) * 12 + inch) * IN;
  }
  const v = parseFrac(s);
  if (isNaN(v)) return null;
  return state.units === 'metric' ? v * 10 : v * IN;
}

/* ---------------- geometry helpers ---------------- */
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const sub = (a, b) => ({ x: a.x - b.x, y: a.y - b.y });
const add = (a, b) => ({ x: a.x + b.x, y: a.y + b.y });
const mul = (a, k) => ({ x: a.x * k, y: a.y * k });
const norm = a => { const l = Math.hypot(a.x, a.y) || 1; return { x: a.x / l, y: a.y / l }; };
const perp = a => ({ x: -a.y, y: a.x });

function closestOnSeg(p, a, b) {
  const ab = sub(b, a), len2 = ab.x * ab.x + ab.y * ab.y;
  let t = len2 ? ((p.x - a.x) * ab.x + (p.y - a.y) * ab.y) / len2 : 0;
  t = clamp(t, 0, 1);
  return { point: add(a, mul(ab, t)), t };
}
function distToSeg(p, a, b) { return dist(p, closestOnSeg(p, a, b).point); }

function segsIntersect(p1, p2, p3, p4) {
  const d = (p2.x - p1.x) * (p4.y - p3.y) - (p2.y - p1.y) * (p4.x - p3.x);
  if (Math.abs(d) < 1e-9) return false;
  const t = ((p3.x - p1.x) * (p4.y - p3.y) - (p3.y - p1.y) * (p4.x - p3.x)) / d;
  const u = ((p3.x - p1.x) * (p2.y - p1.y) - (p3.y - p1.y) * (p2.x - p1.x)) / d;
  return t > 1e-9 && t < 1 - 1e-9 && u > 1e-9 && u < 1 - 1e-9;
}

function polygonArea(verts) {
  let a = 0;
  for (let i = 0; i < verts.length; i++) {
    const p = verts[i], q = verts[(i + 1) % verts.length];
    a += p.x * q.y - q.x * p.y;
  }
  return Math.abs(a) / 2;
}

function pointInPolygon(p, verts) {
  let inside = false;
  for (let i = 0, j = verts.length - 1; i < verts.length; j = i++) {
    const a = verts[i], b = verts[j];
    if ((a.y > p.y) !== (b.y > p.y) &&
        p.x < (b.x - a.x) * (p.y - a.y) / (b.y - a.y) + a.x) inside = !inside;
  }
  return inside;
}

function polyBounds(pts) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of pts) {
    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
  }
  return { minX, minY, maxX, maxY };
}

/* rotate point p around origin by a radians */
function rot(p, a) {
  const c = Math.cos(a), s = Math.sin(a);
  return { x: p.x * c - p.y * s, y: p.x * s + p.y * c };
}

/* ---------------- walls (room polygon) ---------------- */
function roomClosed() { return state.room.vertices.length >= 3; }
function wallCount() { return roomClosed() ? state.room.vertices.length : 0; }
function wallSeg(i) {
  const v = state.room.vertices;
  return { a: v[i], b: v[(i + 1) % v.length] };
}
function wallLen(i) { const s = wallSeg(i); return dist(s.a, s.b); }
function wallDir(i) { const s = wallSeg(i); return norm(sub(s.b, s.a)); }

/* +1 if interior lies on the perp(dir) side of wall i, else -1 */
function interiorSign(i) {
  const s = wallSeg(i);
  const mid = mul(add(s.a, s.b), 0.5);
  const n = perp(norm(sub(s.b, s.a)));
  const probe = add(mid, mul(n, 1));  // 1 mm to the perp side
  return pointInPolygon(probe, state.room.vertices) ? 1 : -1;
}

/* world-space geometry of an opening on its wall */
function openingGeom(o) {
  if (o.wall >= wallCount()) return null;
  const s = wallSeg(o.wall);
  const u = norm(sub(s.b, s.a));
  const c = add(s.a, mul(u, o.offset));
  return { c, u, n: perp(u), ang: Math.atan2(u.y, u.x), sign: interiorSign(o.wall) };
}

function clampOpenings() {
  if (!roomClosed()) { state.openings = []; return; }
  state.openings = state.openings.filter(o => Number.isInteger(o.wall) && o.wall >= 0 && o.wall < wallCount());
  for (const o of state.openings) {
    const len = wallLen(o.wall);
    o.width = clamp(o.width, 100, Math.max(100, len - 60));
    o.offset = clamp(o.offset, o.width / 2 + 10, Math.max(o.width / 2 + 10, len - o.width / 2 - 10));
  }
}

/* footprint corners of a furniture item (world coords, CW) */
function furnCorners(f) {
  const a = rad(f.rot), hw = f.w / 2, hd = f.d / 2;
  return [{ x: -hw, y: -hd }, { x: hw, y: -hd }, { x: hw, y: hd }, { x: -hw, y: hd }]
    .map(p => add(rot(p, a), f));
}

/* convex quad overlap via separating-axis test */
function quadsOverlap(A, B) {
  for (const poly of [A, B]) {
    for (let i = 0; i < poly.length; i++) {
      const e = sub(poly[(i + 1) % poly.length], poly[i]);
      const axis = perp(e);
      let minA = Infinity, maxA = -Infinity, minB = Infinity, maxB = -Infinity;
      for (const p of A) { const v = p.x * axis.x + p.y * axis.y; minA = Math.min(minA, v); maxA = Math.max(maxA, v); }
      for (const p of B) { const v = p.x * axis.x + p.y * axis.y; minB = Math.min(minB, v); maxB = Math.max(maxB, v); }
      if (maxA <= minB + 1 || maxB <= minA + 1) return false;   // 1 mm tolerance
    }
  }
  return true;
}

function isRug(f) { return /^rug/.test(f.kind); }

/* ids of furniture that overlap other furniture or cross a wall */
function computeOverlaps() {
  const bad = new Set();
  const polys = state.furniture.map(furnCorners);
  for (let i = 0; i < state.furniture.length; i++) {
    for (let j = i + 1; j < state.furniture.length; j++) {
      if (isRug(state.furniture[i]) || isRug(state.furniture[j])) continue;
      if (quadsOverlap(polys[i], polys[j])) {
        bad.add(state.furniture[i].id); bad.add(state.furniture[j].id);
      }
    }
  }
  if (roomClosed()) {
    const verts = state.room.vertices;
    for (let i = 0; i < state.furniture.length; i++) {
      const poly = polys[i];
      let cross = poly.some(p => !pointInPolygon(p, verts));
      if (!cross) {
        outer: for (let k = 0; k < poly.length; k++) {
          for (let wIdx = 0; wIdx < verts.length; wIdx++) {
            if (segsIntersect(poly[k], poly[(k + 1) % poly.length], verts[wIdx], verts[(wIdx + 1) % verts.length])) {
              cross = true; break outer;
            }
          }
        }
      }
      if (cross) bad.add(state.furniture[i].id);
    }
  }
  return bad;
}

/* ---------------- history (undo / redo) ---------------- */
let histUndo = [], histRedo = [];
function pushHistory() {
  histUndo.push(JSON.stringify(state));
  if (histUndo.length > 100) histUndo.shift();
  histRedo.length = 0;
}
function undo() {
  if (!histUndo.length) return;
  histRedo.push(JSON.stringify(state));
  state = JSON.parse(histUndo.pop());
  clearSel(); cancelModes(); commit(false);
}
function redo() {
  if (!histRedo.length) return;
  histUndo.push(JSON.stringify(state));
  state = JSON.parse(histRedo.pop());
  clearSel(); cancelModes(); commit(false);
}

/* ---------------- persistence ---------------- */
let autosaveTimer = null;
function scheduleAutosave() {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORE_AUTO, JSON.stringify({ state, view }));
    } catch (e) { /* storage full/blocked — non-fatal */ }
  }, 350);
}

function loadAutosave() {
  try {
    const raw = localStorage.getItem(STORE_AUTO);
    if (!raw) return false;
    const doc = JSON.parse(raw);
    if (!doc.state || doc.state.version !== 1) return false;
    state = Object.assign(defaultState(), doc.state);
    if (doc.view) view = doc.view;
    return true;
  } catch (e) { return false; }
}

function getLayouts() {
  try { return JSON.parse(localStorage.getItem(STORE_LAYOUTS)) || {}; }
  catch (e) { return {}; }
}
function setLayouts(l) {
  try { localStorage.setItem(STORE_LAYOUTS, JSON.stringify(l)); }
  catch (e) { toast('Could not save — browser storage unavailable or full'); }
}

function saveLayout(name) {
  const layouts = getLayouts();
  layouts[name] = { saved: Date.now(), state: JSON.parse(JSON.stringify(state)) };
  layouts[name].state.name = name;
  setLayouts(layouts);
  state.name = name;
  updateToolbar();
  toast('Saved “' + name + '”');
}

function loadLayoutByName(name) {
  const entry = getLayouts()[name];
  if (!entry) { toast('Layout not found'); return; }
  pushHistory();
  state = Object.assign(defaultState(), JSON.parse(JSON.stringify(entry.state)));
  state.name = name;
  clearSel(); cancelModes();
  zoomToFit();
  commit();
  toast('Loaded “' + name + '”');
}

/* central "something changed" — re-render, refresh panels, autosave */
function commit(save = true) {
  clampOpenings();
  render();
  updateProps();
  updateToolbar();
  if (save) scheduleAutosave();
}

  drawingVerts = null;

  measure = { a: null, b: null, live: false };
  hoverWall = null;
  document.querySelectorAll('.pal-item.armed').forEach(el => el.classList.remove('armed'));
}
